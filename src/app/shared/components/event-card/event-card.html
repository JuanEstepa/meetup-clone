<div
  class="bg-white rounded-2xl overflow-hidden flex flex-col h-full cursor-pointer hover:-translate-y-1 hover:shadow-xl transition-all duration-300"
  style="box-shadow: 0px 2px 8px rgba(0,0,0,0.20);"
  (click)="goToDetail()"
>
  <!-- Imagen -->
  <div class="relative p-3 flex-shrink-0">
    <img
      [src]="event().image"
      [alt]="event().title"
      class="w-full h-48 object-cover rounded-xl"
    />

    <!-- Badge frecuencia -->
    <span
      class="absolute top-6 left-6 bg-white text-[#232326] text-xs font-medium px-3 py-1 rounded-full"
      style="box-shadow: 0px 2px 6px rgba(0,0,0,0.15);"
    >
      {{ event().frequency }}
    </span>

    <!-- Botón compartir -->
    <button
      class="absolute top-6 right-6 bg-white w-9 h-9 rounded-full flex items-center justify-center hover:scale-110 transition-transform"
      style="box-shadow: 0px 2px 6px rgba(0,0,0,0.15);"
      (click)="openShare($event)"
    >
      <i class="pi pi-share-alt text-[#232326] text-sm"></i>
    </button>
  </div>

  <!-- Contenido -->
  <div class="px-4 pb-4 flex flex-col flex-1">

    <!-- Título -->
    <h3 class="font-black text-[#232326] text-lg mb-1 line-clamp-2 min-h-[56px]">
      {{ event().title }}
    </h3>

    <!-- Organizador + rating -->
    <p class="text-sm text-gray-500 mb-2 flex items-center gap-1">
      Por {{ event().organizer }} •
      <span class="text-[#232326] font-medium">{{ event().rating }}</span>
      <i class="pi pi-star-fill text-yellow-400 text-xs"></i>
    </p>

    <!-- Fecha, hora, precio -->
    <div class="flex items-center gap-2 text-xs text-gray-500 mb-4 flex-wrap">
      <span class="flex items-center gap-1">
        <i class="pi pi-calendar text-gray-400"></i>
        <span class="font-medium text-[#232326]">{{ event().date }}</span>
      </span>
      <span class="text-gray-300">|</span>
      <span class="flex items-center gap-1">
        <i class="pi pi-clock text-gray-400"></i>
        <span class="font-medium text-[#232326]">{{ event().time }}</span>
      </span>
      <span class="text-gray-300">|</span>
      <span class="font-bold text-[#232326]">
        {{ eventsService.formatPrice(event().price) }}
      </span>
    </div>

    <!-- Inscribirse + Asistentes -->
    <div class="flex items-center gap-3 mt-auto">
      <button
        class="bg-[#232326] text-white text-sm font-bold rounded-full flex items-center justify-center flex-1 hover:bg-gray-700 active:scale-95 transition-all"
        style="min-height: 44px;"
        (click)="goToDetail()"
      >
        Inscribirse
      </button>

      <div class="flex items-center justify-end">
        <div class="flex -space-x-3">
          <img src="https://i.pravatar.cc/32?img=1" class="w-8 h-8 rounded-full border-2 border-white object-cover" alt="asistente"/>
          <img src="https://i.pravatar.cc/32?img=2" class="w-8 h-8 rounded-full border-2 border-white object-cover" alt="asistente"/>
          <img src="https://i.pravatar.cc/32?img=3" class="w-8 h-8 rounded-full border-2 border-white object-cover" alt="asistente"/>
        </div>
        <span class="text-sm text-gray-500 ml-2 whitespace-nowrap font-medium">
          {{ event().attendees }} Asistentes
        </span>
      </div>
    </div>
  </div>
</div>

<!-- Modal fuera de la card — renderiza sobre toda la página -->
@if (showShareModal) {
  <div
    class="fixed inset-0 z-[9999] flex items-end md:items-center justify-center"
    (click)="closeShare()"
  >
    <!-- Overlay oscuro -->
    <div class="absolute inset-0 bg-black/50 backdrop-blur-sm"></div>

    <!-- Modal -->
    <div
      class="relative bg-white rounded-t-2xl md:rounded-2xl p-6 w-full md:w-80 z-10"
      style="box-shadow: 0px 8px 32px rgba(0,0,0,0.24);"
      (click)="$event.stopPropagation()"
    >
      <!-- Header -->
      <div class="flex items-center justify-between mb-5">
        <h4 class="font-bold text-[#232326] text-lg">Compartir evento</h4>
        <button
          class="w-8 h-8 rounded-full bg-gray-100 flex items-center justify-center hover:bg-gray-200 transition-colors"
          (click)="closeShare()"
        >
          <i class="pi pi-times text-sm text-[#232326]"></i>
        </button>
      </div>

      <!-- WhatsApp -->
      <button
        class="w-full flex items-center gap-4 p-3 rounded-xl hover:bg-gray-50 transition-colors mb-2"
        (click)="shareWhatsapp()"
      >
        <div class="w-11 h-11 rounded-full bg-[#25D366] flex items-center justify-center flex-shrink-0">
          <svg width="22" height="22" fill="white" viewBox="0 0 24 24">
            <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/>
          </svg>
        </div>
        <span class="font-semibold text-[#232326] text-base">WhatsApp</span>
      </button>

      <!-- Copiar link -->
      <button
        class="w-full flex items-center gap-4 p-3 rounded-xl hover:bg-gray-50 transition-colors"
        (click)="copyLink()"
      >
        <div class="w-11 h-11 rounded-full bg-gray-100 flex items-center justify-center flex-shrink-0">
          <i class="pi pi-link text-[#232326] text-lg"></i>
        </div>
        <span class="font-semibold text-[#232326] text-base">Copiar enlace</span>
      </button>

    </div>
  </div>
}
